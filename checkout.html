<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán | Lavivu</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <!-- Navbar Minimal -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4 d-flex align-items-center gap-2" href="index.html">
                <img src="img/logo.png" alt="Lavivu Logo" class="navbar-logo" style="height:40px;"> Lavivu
            </a>
            <a href="index.html" class="text-light text-decoration-none hover-primary ms-auto"><i class="fa-solid fa-arrow-left me-1"></i> Quay lại</a>
        </div>
    </nav>

    <!-- Checkout Section -->
    <div class="container py-5">
        <div class="row g-4">
            <!-- Left Column: Booking Form -->
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm rounded-3">
                    <div class="card-body p-4 p-md-5">
                        <h3 class="fw-bold text-dark mb-4"><i class="fa-solid fa-clipboard-user text-primary me-2"></i> Thông Tin Đặt Tour</h3>
                        <form id="checkout-form">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fs-7 fw-medium text-muted">Họ và tên *</label>
                                    <input type="text" class="form-control rounded-1" placeholder="Vd: Nguyễn Văn A" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fs-7 fw-medium text-muted">Số điện thoại *</label>
                                    <input type="tel" class="form-control rounded-1" placeholder="Vd: 0901234567" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fs-7 fw-medium text-muted">Email *</label>
                                    <input type="email" class="form-control rounded-1" placeholder="example@email.com" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fs-7 fw-medium text-muted">Số lượng vé *</label>
                                    <div class="input-group">
                                        <button class="btn btn-outline-secondary" type="button" id="btn-minus"><i class="fa-solid fa-minus"></i></button>
                                        <input type="number" class="form-control text-center fw-bold" id="ticket-qty" value="1" min="1" max="20" required readonly>
                                        <button class="btn btn-outline-secondary" type="button" id="btn-plus"><i class="fa-solid fa-plus"></i></button>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fs-7 fw-medium text-muted">Ghi chú thêm</label>
                                    <textarea class="form-control rounded-1" rows="3" placeholder="Yêu cầu đặc biệt..."></textarea>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Right Column: Order Summary -->
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm rounded-3 position-sticky" style="top: 100px;">
                    <div class="card-body p-4 p-md-5 bg-white">
                        <h4 class="fw-bold text-dark mb-4">Chi Tiết Thanh Toán</h4>
                        
                        <div class="mb-3 pb-3 border-bottom">
                            <h6 class="fw-bold text-dark mb-1" id="tour-name">Đang tải tên tour...</h6>
                            <p class="text-muted fs-7 mb-0"><i class="fa-solid fa-calendar-days text-primary me-1"></i> Lịch trình linh hoạt</p>
                        </div>

                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Giá vé (x<span id="summary-qty">1</span>)</span>
                            <span class="fw-medium text-dark" id="tour-price">0đ</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 pb-3 border-bottom">
                            <span class="text-muted">Phí dịch vụ</span>
                            <span class="fw-medium text-success">Miễn phí</span>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <span class="fw-bold fs-5 text-dark">Tổng cộng</span>
                            <span class="fw-bold fs-4 text-primary" id="total-price">0đ</span>
                        </div>

                        <button form="checkout-form" type="submit" class="btn btn-primary w-100 py-3 rounded-2 fw-bold fs-6 shadow-sm btn-submit">XÁC NHẬN ĐẶT TOUR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Function to format number to VND format string
            const formatCurrency = (number) => {
                return new Intl.NumberFormat('vi-VN').format(number) + 'đ';
            };

            // Parse URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const tourTitle = urlParams.get('title') || 'Tour Khám Phá Việt Nam';
            const basePriceStr = urlParams.get('price') || '0';
            const basePrice = parseInt(basePriceStr, 10);

            // DOM Elements
            const nameEl = document.getElementById('tour-name');
            const priceEl = document.getElementById('tour-price');
            const totalEl = document.getElementById('total-price');
            const qtyInput = document.getElementById('ticket-qty');
            const summaryQty = document.getElementById('summary-qty');
            const btnMinus = document.getElementById('btn-minus');
            const btnPlus = document.getElementById('btn-plus');
            const checkoutForm = document.getElementById('checkout-form');

            // Set Initial Values
            nameEl.innerText = tourTitle;
            priceEl.innerText = formatCurrency(basePrice);
            
            // Function to update totals
            const updateTotals = () => {
                const qty = parseInt(qtyInput.value, 10);
                summaryQty.innerText = qty;
                const total = basePrice * qty;
                totalEl.innerText = formatCurrency(total);
            };

            updateTotals();

            // Quantity buttons logic
            btnMinus.addEventListener('click', () => {
                let currentVal = parseInt(qtyInput.value, 10);
                if (currentVal > 1) {
                    qtyInput.value = currentVal - 1;
                    updateTotals();
                }
            });

            btnPlus.addEventListener('click', () => {
                let currentVal = parseInt(qtyInput.value, 10);
                if(currentVal < parseInt(qtyInput.max)) {
                    qtyInput.value = currentVal + 1;
                    updateTotals();
                }
            });

            // Form Submit Logic
            checkoutForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const btnSubmit = document.querySelector('.btn-submit');
                const originalText = btnSubmit.innerText;
                
                btnSubmit.innerText = "Đang xử lý...";
                btnSubmit.classList.add('disabled');

                setTimeout(() => {
                    alert('Cảm ơn bạn! Đặt tour thành công. Chúng tôi sẽ liên hệ trong thời gian sớm nhất.');
                    window.location.href = 'index.html';
                }, 1500);
            });
        });
    </script>
        <!-- Bounce Rate Tracker - Firebase Collection: bouncetracker -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzPCkfos0wKGadAH8SSvb8KATMyhMygZk",
            authDomain: "ec-website-b7b87.firebaseapp.com",
            projectId: "ec-website-b7b87",
            storageBucket: "ec-website-b7b87.firebasestorage.app",
            messagingSenderId: "318849736986",
            appId: "1:318849736986:web:6a24d37ab39a26094f0ca3",
            measurementId: "G-59GY08R25R"
        };

        let app, db;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            console.log('[BounceTracker] ✅ Đã kết nối Firebase');
        } catch (error) {
            console.error('[BounceTracker] ❌ Lỗi:', error);
        }

        class BounceTracker {
            constructor() {
                this.sessionId = this.getSessionId();
                this.hasInteraction = false;
                this.startTime = Date.now();
                this.currentPage = window.location.pathname.includes('checkout.html') ? 'checkout' : 'index';
                this.isTracked = false;
                this.setupListeners();
                this.recordPageView();
            }

            getSessionId() {
                let id = sessionStorage.getItem('bt_session');
                if (!id) {
                    id = 's_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                    sessionStorage.setItem('bt_session', id);
                }
                return id;
            }

            setupListeners() {
                const events = ['click', 'scroll', 'keydown', 'touchstart', 'mousemove', 'submit'];
                events.forEach(event => {
                    window.addEventListener(event, () => {
                        if (!this.hasInteraction) {
                            this.hasInteraction = true;
                            console.log('[BounceTracker] 🖱️ Có tương tác trên', this.currentPage);
                        }
                    }, { once: true });
                });

                window.addEventListener('beforeunload', () => this.trackBounce());
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) this.trackBounce();
                });

                setTimeout(() => {
                    if (!this.hasInteraction && !this.isTracked) this.trackBounce();
                }, 30000);
            }

            async recordPageView() {
                if (!db) return;
                try {
                    const today = new Date().toISOString().split('T')[0];
                    const ref = doc(db, "bouncetracker", "stats");
                    const snap = await getDoc(ref);
                    
                    if (snap.exists()) {
                        await updateDoc(ref, {
                            [`views.${today}.${this.currentPage}`]: increment(1),
                            [`totalViews.${this.currentPage}`]: increment(1),
                            totalViewsAll: increment(1),
                            lastUpdate: new Date().toISOString()
                        });
                    } else {
                        await setDoc(ref, {
                            views: { [today]: { [this.currentPage]: 1 } },
                            totalViews: { [this.currentPage]: 1 },
                            totalViewsAll: 1,
                            bounces: {},
                            totalBounces: 0,
                            lastUpdate: new Date().toISOString()
                        });
                    }
                    console.log('[BounceTracker] 📄 Đã ghi nhận view:', this.currentPage);
                } catch (e) { console.error(e); }
            }

            async trackBounce() {
                if (this.isTracked || !db) return;
                this.isTracked = true;
                
                if (this.hasInteraction) {
                    console.log('[BounceTracker] ✅ Có tương tác - không tính bounce');
                    return;
                }

                try {
                    const today = new Date().toISOString().split('T')[0];
                    const duration = Math.round((Date.now() - this.startTime) / 1000);
                    const ref = doc(db, "bouncetracker", "stats");
                    const snap = await getDoc(ref);
                    
                    const bounceData = {
                        page: this.currentPage,
                        duration: duration,
                        time: new Date().toISOString(),
                        referrer: document.referrer || 'direct'
                    };

                    if (snap.exists()) {
                        await updateDoc(ref, {
                            [`bounces.${today}.${this.sessionId}`]: bounceData,
                            [`dailyBounces.${today}`]: increment(1),
                            totalBounces: increment(1)
                        });
                    } else {
                        await setDoc(ref, {
                            views: {},
                            totalViews: {},
                            totalViewsAll: 0,
                            bounces: { [today]: { [this.sessionId]: bounceData } },
                            dailyBounces: { [today]: 1 },
                            totalBounces: 1,
                            lastUpdate: new Date().toISOString()
                        });
                    }
                    
                    console.log('[BounceTracker] 📤 Bounce! Thời gian:', duration, 'giây');
                    this.logBounceRate();
                } catch (e) { console.error(e); }
            }

            async logBounceRate() {
                if (!db) return;
                try {
                    const ref = doc(db, "bouncetracker", "stats");
                    const snap = await getDoc(ref);
                    if (snap.exists()) {
                        const data = snap.data();
                        const today = new Date().toISOString().split('T')[0];
                        const todayViews = data.views?.[today] ? 
                            Object.values(data.views[today]).reduce((a,b) => a+b, 0) : 0;
                        const todayBounces = data.dailyBounces?.[today] || 0;
                        const rate = todayViews > 0 ? (todayBounces / todayViews * 100).toFixed(2) : 0;
                        console.log(`[BounceTracker] 📊 Bounce Rate hôm nay: ${rate}% (${todayBounces}/${todayViews})`);
                    }
                } catch(e) {}
            }

            async getStats() {
                if (!db) return null;
                try {
                    const ref = doc(db, "bouncetracker", "stats");
                    const snap = await getDoc(ref);
                    if (snap.exists()) {
                        const data = snap.data();
                        const today = new Date().toISOString().split('T')[0];
                        const todayViews = data.views?.[today] ? 
                            Object.values(data.views[today]).reduce((a,b) => a+b, 0) : 0;
                        const todayBounces = data.dailyBounces?.[today] || 0;
                        return {
                            today: { views: todayViews, bounces: todayBounces, rate: todayViews > 0 ? (todayBounces/todayViews*100).toFixed(2) : 0 },
                            total: { views: data.totalViewsAll || 0, bounces: data.totalBounces || 0, rate: data.totalViewsAll > 0 ? (data.totalBounces/data.totalViewsAll*100).toFixed(2) : 0 },
                            pages: data.totalViews || {}
                        };
                    }
                } catch(e) {}
                return null;
            }
        }

        // Khởi tạo tracker
        const tracker = new BounceTracker();
        window.bounceTracker = tracker;

        // Thêm dashboard vào Admin Modal
        setTimeout(() => {
            const modalBody = document.querySelector('#adminModal .modal-body');
            if (modalBody && !document.getElementById('bt-dashboard')) {
                const dashboard = document.createElement('div');
                dashboard.id = 'bt-dashboard';
                dashboard.className = 'mt-5 pt-4 border-top border-secondary border-opacity-25';
                dashboard.innerHTML = `
                    <h5 class="text-primary fw-bold mb-3"><i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Bounce Rate (bouncetracker)</h5>
                    <div class="row g-3 text-center">
                        <div class="col-6">
                            <div class="card bg-dark border-danger">
                                <div class="card-body p-3">
                                    <small class="text-muted">Hôm nay</small>
                                    <h3 class="text-danger mb-0" id="bt-today-rate">0%</h3>
                                    <small id="bt-today-stats">(0/0)</small>
                                </div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="card bg-dark border-warning">
                                <div class="card-body p-3">
                                    <small class="text-muted">Tổng thể</small>
                                    <h3 class="text-warning mb-0" id="bt-total-rate">0%</h3>
                                    <small id="bt-total-stats">(0/0)</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button id="bt-refresh" class="btn btn-outline-secondary btn-sm w-100 mt-3 rounded-0"><i class="fa-solid fa-rotate-right me-2"></i> Làm mới</button>
                `;
                modalBody.appendChild(dashboard);

                async function updateBT() {
                    const stats = await tracker.getStats();
                    if (stats) {
                        document.getElementById('bt-today-rate').textContent = stats.today.rate + '%';
                        document.getElementById('bt-today-stats').textContent = `(${stats.today.bounces}/${stats.today.views})`;
                        document.getElementById('bt-total-rate').textContent = stats.total.rate + '%';
                        document.getElementById('bt-total-stats').textContent = `(${stats.total.bounces}/${stats.total.views})`;
                    }
                }
                document.getElementById('bt-refresh').onclick = () => { updateBT(); };
                updateBT();
            }
        }, 500);

        window.getBounceStats = () => tracker.getStats();
        console.log('[BounceTracker] 🚀 Đã sẵn sàng! Dùng getBounceStats() để xem chi tiết');
    </script>
</body>

</html>
